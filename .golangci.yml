version: "2"
linters:
  default: standard
  exclusions:
    rules:
      # fmt.Fprint/Fprintf/Fprintln to stdout/stderr — errors are intentionally ignored
      - linters: [errcheck]
        text: "fmt\\.(Fprint|Fprintf|Fprintln)"
      # tabwriter.Flush in CLI output — error is intentionally ignored
      - linters: [errcheck]
        text: "Flush"
      # Close/Remove in cleanup/defer — best-effort cleanup
      - linters: [errcheck]
        text: "(Close|Remove)"
